<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Word Scramble</title>
    <link rel="stylesheet" href="css/games.css"> 
    <link rel="stylesheet" href="css/video.css">
    <link rel="icon" href="ico.ico?v=2" type="image/x-icon">
    <style>
        .word-display {
            font-size: 3rem;
            letter-spacing: 10px;
            color: #ffcc00;
            margin: 20px 0;
            text-transform: uppercase;
            font-weight: bold;
        }
        .input-area {
            margin: 20px 0;
        }
        .word-input {
            padding: 10px;
            font-size: 1.2rem;
            border-radius: 5px;
            border: none;
            width: 250px;
            text-align: center;
        }
        .hint-text {
            color: #aaa;
            font-style: italic;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <header class="container">
            <span class="logo">Mini Games</span>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="sborki.html">Interesting Facts</a></li>
                    <li><a href="video.html">Videos</a></li>
                    <li><a href="quiz.html">Quizzes</a></li>
                    <li class="active"><a href="games.html">Mini Games</a></li>
                    <li><a href="repleyi.html">Information</a></li>
                </ul>
            </nav>
        </header>

        <main class="container">
            <section class="game-section">
                <h1>🔠 Word Scramble</h1>
                <p>Unscramble the word related to UK or Poland!</p>
                
                <div class="game-container">
                    <div id="scrambled-word" class="word-display">-----</div>
                    <p id="hint" class="hint-text">Hint will appear here</p>
                    
                    <div class="input-area">
                        <input type="text" id="user-guess" class="word-input" placeholder="Type here..." autocomplete="off">
                    </div>
                    
                    <div class="button-group">
                        <button class="action-button" onclick="checkWord()">Check Word</button>
                        <button class="action-button" onclick="initGame()" style="background: #444;">New Word</button>
                    </div>
                    
                    <p id="message" style="margin-top: 20px; font-weight: bold;"></p>
                </div>
            </section>
        </main>
    </div>

    <script>
        const words = [
            { word: "LONDON", hint: "Capital of the UK 🇬🇧" },
            { word: "WARSAW", hint: "Capital of Poland 🇵🇱" },
            { word: "PIEROGI", hint: "Famous Polish dumplings 🥟" },
            { word: "BIGBEN", hint: "Iconic clock tower in London 🕰️" },
            { word: "KRAKOW", hint: "Ancient royal city in Poland 🏰" },
            { word: "THAMES", hint: "The river flowing through London 🌊" },
            { word: "BISON", hint: "The king of the Białowieża Forest 🦬" }
        ];

        let currentWord = "";

        function scramble(word) {
            return word.split('').sort(() => Math.random() - 0.5).join('');
        }

        function initGame() {
            const randomObj = words[Math.floor(Math.random() * words.length)];
            currentWord = randomObj.word;
            let scrambled = scramble(currentWord);
            
            // Чтобы не выпало случайно правильное слово
            while(scrambled === currentWord) {
                scrambled = scramble(currentWord);
            }

            document.getElementById("scrambled-word").innerText = scrambled;
            document.getElementById("hint").innerText = "Hint: " + randomObj.hint;
            document.getElementById("message").innerText = "";
            document.getElementById("user-guess").value = "";
        }

        function checkWord() {
            const userGuess = document.getElementById("user-guess").value.toUpperCase();
            const msg = document.getElementById("message");
            
            if (userGuess === currentWord) {
                msg.innerText = "Correct! 🎉";
                msg.style.color = "#2ecc71";
                setTimeout(initGame, 2000);
            } else {
                msg.innerText = "Try again! ❌";
                msg.style.color = "#e74c3c";
            }
        }

        // Запуск по Enter
        document.getElementById("user-guess").addEventListener("keypress", function(e) {
            if (e.key === "Enter") checkWord();
        });

        window.onload = initGame;
    </script>
</body>
</html>
