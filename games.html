<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mini Games</title>
    <link rel="stylesheet" href="css/main.css"> 
    <style>
        /* Стили для игры (можно вынести в отдельный файл или оставить тут) */
        .game-section { padding: 50px 0; color: white; text-align: center; }
        .draggables { display: flex; justify-content: center; gap: 15px; margin: 30px 0; flex-wrap: wrap; }
        .drag-item { padding: 12px 25px; background: #ffcc00; color: #000; border-radius: 8px; cursor: grab; font-weight: bold; font-size: 1.1rem; }
        .drop-zones { display: flex; gap: 40px; justify-content: center; margin-top: 50px; }
        .zone { width: 300px; height: 200px; border: 3px dashed #777; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; background: rgba(255,255,255,0.05); }
        .zone.hover { border-color: #fff; background: rgba(255,255,255,0.15); }
        .zone h3 { margin-bottom: 10px; pointer-events: none; }
        .correct { background: #4caf50 !important; color: white !important; }
        /* Кнопки управления */
.game-btn {
    padding: 15px 30px;
    font-size: 1.2rem;
    font-weight: bold;
    color: white;
    background: #007bff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
    margin: 0 10px;
}
.game-btn:hover { background: #0056b3; }

/* Подсветка результатов */
.correct-answer { background: #28a745 !important; color: white !important; border: 2px solid #fff; }
.wrong-answer { background: #dc3545 !important; color: white !important; border: 2px solid #fff; }

/* Зона, когда в ней есть предметы */
.zone {
    width: 350px; /* Можно чуть расширить для удобства */
    min-height: 200px; /* Минимальная высота, если корзина пустая */
    height: auto; /* Высота будет расти сама */
    border: 3px dashed #777;
    border-radius: 15px;
    display: flex;
    flex-wrap: wrap; /* Элементы будут переноситься на новую строку */
    align-content: flex-start; /* Прижимаем элементы к верху */
    justify-content: center; /* Центрируем их по горизонтали */
    gap: 10px; /* Расстояние между карточками внутри */
    padding: 20px;
    transition: 0.3s;
    background: rgba(255,255,255,0.05);
}

/* Добавим стили для заголовка внутри зоны, чтобы он не мешал карточкам */
.zone h3 {
    width: 100%; /* Заголовок всегда сверху на всю ширину */
    text-align: center;
    margin-bottom: 15px;
    pointer-events: none;
}
    </style>
</head>

<body>
    <div class="wrapper">
        <header class="container">
            <span class="logo">Mini Games</span>
            <nav>
                <ul>

                </ul>

        </header>

        <main class="container">
            <section class="game-section">
    <h1>Country Sorter</h1>
    <p>Drag all items to the boxes, then click "Check Results"!</p>

    <div class="draggables" id="items-box">
        <div class="drag-item" draggable="true" id="item1" data-target="uk">Big Ben 🕰️</div>
        <div class="drag-item" draggable="true" id="item2" data-target="pl">Pierogi 🥟</div>
        <div class="drag-item" draggable="true" id="item3" data-target="uk">Double Decker 🚌</div>
        <div class="drag-item" draggable="true" id="item4" data-target="pl">Żubr 🦬</div>
        <div class="drag-item" draggable="true" id="item5" data-target="uk">Royal Guard 💂</div>
        <div class="drag-item" draggable="true" id="item6" data-target="pl">Wawel Dragon 🐉</div>
    </div>

    <div class="drop-zones">
        <div class="zone" id="uk">
            <h3>🇬🇧 UK</h3>
        </div>
        <div class="zone" id="pl">
            <h3>🇵🇱 POLAND</h3>
        </div>
    </div>

    <div style="margin-top: 30px;">
        <button id="check-btn" class="game-btn">Check Results</button>
        <button id="reset-btn" class="game-btn" style="background: #555;">Reset</button>
        <h2 id="scoretext" style="margin-top: 20px;"></h2>
    </div>
</section>
        </main>
    </div>

   <script>
    const items = document.querySelectorAll('.drag-item');
    const zones = document.querySelectorAll('.zone');
    const checkBtn = document.getElementById('check-btn');
    const resetBtn = document.getElementById('reset-btn');
    const scoreDisplay = document.getElementById('scoretext');

    // Логика перетаскивания
    items.forEach(item => {
        item.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('text', e.target.id);
        });
    });

    zones.forEach(zone => {
        zone.addEventListener('dragover', (e) => e.preventDefault());
        zone.addEventListener('drop', (e) => {
            e.preventDefault();
            const id = e.dataTransfer.getData('text');
            const draggable = document.getElementById(id);
            zone.appendChild(draggable); // Просто добавляем в зону, не проверяя
        });
    });

    // Кнопка проверки
    checkBtn.onclick = function() {
        let score = 0;
        let total = items.length;

        items.forEach(item => {
            const parentZone = item.parentElement;
            
            // Проверяем, находится ли предмет в зоне вообще
            if (parentZone.classList.contains('zone')) {
                if (item.dataset.target === parentZone.id) {
                    item.classList.add('correct-answer');
                    item.classList.remove('wrong-answer');
                    score++;
                } else {
                    item.classList.add('wrong-answer');
                    item.classList.remove('correct-answer');
                }
            }
        });

        scoreDisplay.innerText = `Your Score: ${score} / ${total}`;
        if(score === total) {
            scoreDisplay.innerText += " - Perfect! 🏆";
        }
    };

    // Кнопка сброса (возвращает всё в начало)
    resetBtn.onclick = function() {
        const box = document.getElementById('items-box');
        items.forEach(item => {
            item.classList.remove('correct-answer', 'wrong-answer');
            item.setAttribute('draggable', 'true');
            box.appendChild(item);
        });
        scoreDisplay.innerText = "";
    };
